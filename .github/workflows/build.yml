name: Build Nekos Viewer .deb

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot

    - name: Build .deb package
      run: |
        chmod +x build-nekos-viewer.sh
        ./build-nekos-viewer.sh
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekos-viewer-deb
        path: ~/nekos-viewer_*.deb
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ~/nekos-viewer_*.deb
        name: Nekos Viewer ${{ github.ref_name }}
        body: |
          🐱 Nekos Viewer ${{ github.ref_name }}

          ## Installation
          ```bash
          sudo dpkg -i nekos-viewer_*.deb
          sudo apt --fix-broken install
          ```

          ## Requirements
          - Debian 13 / Ubuntu 24.04+
          - python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
