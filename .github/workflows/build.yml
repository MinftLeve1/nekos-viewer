name: Build Linux .deb

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.0.3' }}

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version
      run: |
        VERSION="${{ env.VERSION }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot

    - name: Build .deb (inline)
      run: |
        WORK_DIR="$(pwd)/nekos-viewer-build"
        DEB_DIR="$WORK_DIR/nekos-viewer-deb"
        
        echo "🐱 Building Nekos Viewer .deb package..."
        
        rm -rf "$WORK_DIR"
        mkdir -p "$DEB_DIR/DEBIAN"
        mkdir -p "$DEB_DIR/usr/bin"
        mkdir -p "$DEB_DIR/usr/share/nekos-viewer"
        mkdir -p "$DEB_DIR/usr/share/applications"
        mkdir -p "$DEB_DIR/usr/share/pixmaps"
        
        if [ -f "nekos-viewer.py" ]; then
          cp nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        elif [ -f "src/linux/nekos-viewer.py" ]; then
          cp src/linux/nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        elif [ -f "usr/share/nekos-viewer/nekos-viewer.py" ]; then
          cp usr/share/nekos-viewer/nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        else
          echo "ERROR: nekos-viewer.py not found!"
          exit 1
        fi
        
        chmod 755 "$DEB_DIR/usr/share/nekos-viewer/nekos-viewer.py"
        
        cat > "$DEB_DIR/usr/bin/nekos-viewer" << 'BINEOF'
#!/bin/bash
exec python3 /usr/share/nekos-viewer/nekos-viewer.py "$@"
BINEOF
        chmod 755 "$DEB_DIR/usr/bin/nekos-viewer"
        
        cat > "$DEB_DIR/usr/share/applications/nekos-viewer.desktop" << 'DESKEOF'
[Desktop Entry]
Name=Nekos Viewer
Name[zh_CN]=Nekos 图片查看器
Comment=Fetch random images from Nekos.moe
Comment[zh_CN]=从 Nekos.moe 获取随机图片
Exec=nekos-viewer
Icon=nekos-viewer
Type=Application
Categories=Network;Graphics;Viewer;
Terminal=false
StartupNotify=true
DESKEOF
        
        if [ -f "nekos-viewer.png" ]; then
          cp nekos-viewer.png "$DEB_DIR/usr/share/pixmaps/"
          chmod 644 "$DEB_DIR/usr/share/pixmaps/nekos-viewer.png"
        elif [ -f "nekos-viewer.svg" ]; then
          cp nekos-viewer.svg "$DEB_DIR/usr/share/pixmaps/"
          chmod 644 "$DEB_DIR/usr/share/pixmaps/nekos-viewer.svg"
        else
          cat > "$DEB_DIR/usr/share/pixmaps/nekos-viewer.svg" << 'SVGEOF'
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>
  <polygon points="28,45 45,20 55,50" fill="#ff6b6b"/>
  <polygon points="100,45 83,20 73,50" fill="#ff6b6b"/>
  <circle cx="64" cy="70" r="32" fill="#2d2d44"/>
  <ellipse cx="52" cy="65" rx="6" ry="8" fill="#feca57"/>
  <ellipse cx="76" cy="65" rx="6" ry="8" fill="#feca57"/>
  <circle cx="53" cy="64" r="3" fill="#1a1a2e"/>
  <circle cx="77" cy="64" r="3" fill="#1a1a2e"/>
</svg>
SVGEOF
          chmod 644 "$DEB_DIR/usr/share/pixmaps/nekos-viewer.svg"
        fi
        
        VERSION_CLEAN="${VERSION#v}"
        cat > "$DEB_DIR/DEBIAN/control" << CTRLEOF
Package: nekos-viewer
Version: ${VERSION_CLEAN}
Section: web
Priority: optional
Architecture: all
Depends: python3, python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0
Maintainer: Nekos Viewer Team <13378290421@163.com>
Description: Random image viewer for Nekos.moe
 A simple GTK4 application for Nekos.moe API.
CTRLEOF
        
        chmod 755 "$DEB_DIR/DEBIAN"
        chmod 644 "$DEB_DIR/DEBIAN/control"
        
        dpkg-deb --build "$DEB_DIR" "nekos-viewer_${VERSION_CLEAN}_all.deb"
        
        echo "=== Build output ==="
        ls -la nekos-viewer_*.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekos-viewer-deb
        path: nekos-viewer_*.deb

    - name: Create Release (if tag pushed)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: nekos-viewer_*.deb
        name: Nekos Viewer ${{ github.ref_name }}
        body: |
          🐱 **Nekos Viewer ${{ github.ref_name }}**

          ## 安装
          ```bash
          sudo dpkg -i nekos-viewer_*.deb
          sudo apt --fix-broken install
          ```

          ## 依赖
          - Debian 13 / Ubuntu 24.04+
          - python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0

          ## 运行
          ```bash
          nekos-viewer
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
