name: Build Linux .deb

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.0.3' }}

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version
      run: |
        VERSION="${{ env.VERSION }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot

    - name: Build .deb package
      run: |
        set -e
        WORK_DIR="$(pwd)/nekos-viewer-build"
        DEB_DIR="$WORK_DIR/nekos-viewer-deb"
        
        echo "Building Nekos Viewer .deb package..."
        
        rm -rf "$WORK_DIR"
        mkdir -p "$DEB_DIR/DEBIAN"
        mkdir -p "$DEB_DIR/usr/bin"
        mkdir -p "$DEB_DIR/usr/share/nekos-viewer"
        mkdir -p "$DEB_DIR/usr/share/applications"
        mkdir -p "$DEB_DIR/usr/share/pixmaps"
        
        if [ -f "nekos-viewer.py" ]; then
          cp nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        elif [ -f "src/linux/nekos-viewer.py" ]; then
          cp src/linux/nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        elif [ -f "usr/share/nekos-viewer/nekos-viewer.py" ]; then
          cp usr/share/nekos-viewer/nekos-viewer.py "$DEB_DIR/usr/share/nekos-viewer/"
        else
          echo "ERROR: nekos-viewer.py not found!"
          find . -name "*.py" -type f | head -20
          exit 1
        fi
        
        chmod 755 "$DEB_DIR/usr/share/nekos-viewer/nekos-viewer.py"
        
        printf '%s\n' '#!/bin/bash' 'exec python3 /usr/share/nekos-viewer/nekos-viewer.py "$@"' > "$DEB_DIR/usr/bin/nekos-viewer"
        chmod 755 "$DEB_DIR/usr/bin/nekos-viewer"
        
        printf '[Desktop Entry]\nName=Nekos Viewer\nExec=nekos-viewer\nIcon=nekos-viewer\nType=Application\nCategories=Network;Graphics;\nTerminal=false\n' > "$DEB_DIR/usr/share/applications/nekos-viewer.desktop"
        
        if [ -f "nekos-viewer.png" ]; then
          cp nekos-viewer.png "$DEB_DIR/usr/share/pixmaps/"
          chmod 644 "$DEB_DIR/usr/share/pixmaps/nekos-viewer.png"
        elif [ -f "nekos-viewer.svg" ]; then
          cp nekos-viewer.svg "$DEB_DIR/usr/share/pixmaps/"
          chmod 644 "$DEB_DIR/usr/share/pixmaps/nekos-viewer.svg"
        fi
        
        VERSION_CLEAN="${VERSION#v}"
        {
          echo "Package: nekos-viewer"
          echo "Version: ${VERSION_CLEAN}"
          echo "Section: web"
          echo "Priority: optional"
          echo "Architecture: all"
          echo "Depends: python3, python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0"
          echo "Maintainer: Nekos Viewer Team <13378290421@163.com>"
          echo "Description: Random image viewer for Nekos.moe"
          echo " A simple GTK4 application for Nekos.moe API."
        } > "$DEB_DIR/DEBIAN/control"
        
        chmod 755 "$DEB_DIR/DEBIAN"
        chmod 644 "$DEB_DIR/DEBIAN/control"
        
        dpkg-deb --build "$DEB_DIR" "nekos-viewer_${VERSION_CLEAN}_all.deb"
        
        echo "=== Build output ==="
        ls -la nekos-viewer_*.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekos-viewer-deb
        path: nekos-viewer_*.deb

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: nekos-viewer_*.deb
        name: Nekos Viewer ${{ github.ref_name }}
        body: |
          Nekos Viewer ${{ github.ref_name }}

          ## Installation
          ```bash
          sudo dpkg -i nekos-viewer_*.deb
          sudo apt --fix-broken install
          ```

          ## Requirements
          - Debian 13 / Ubuntu 24.04+
          - python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
