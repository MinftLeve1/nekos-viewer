name: Build Linux .deb

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.0.3' }}

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version
      run: |
        VERSION="${{ env.VERSION }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot

    - name: Debug - Check repository structure
      run: |
        echo "=== Repository root ==="
        pwd
        ls -la
        echo "=== Looking for source files ==="
        find . -maxdepth 2 -name "nekos-viewer.py" -type f 2>/dev/null || echo "No nekos-viewer.py found"
        find . -maxdepth 2 -name "*.py" -type f | head -20

    - name: Build .deb
      run: |
        mkdir -p nekos-viewer-deb/DEBIAN
        mkdir -p nekos-viewer-deb/usr/bin
        mkdir -p nekos-viewer-deb/usr/share/nekos-viewer
        mkdir -p nekos-viewer-deb/usr/share/applications
        mkdir -p nekos-viewer-deb/usr/share/pixmaps

        if [ -f "nekos-viewer.py" ]; then
          echo "Found: nekos-viewer.py in root"
          cp nekos-viewer.py nekos-viewer-deb/usr/share/nekos-viewer/
        elif [ -f "src/linux/nekos-viewer.py" ]; then
          echo "Found: src/linux/nekos-viewer.py"
          cp src/linux/nekos-viewer.py nekos-viewer-deb/usr/share/nekos-viewer/
        elif [ -f "usr/share/nekos-viewer/nekos-viewer.py" ]; then
          echo "Found: usr/share/nekos-viewer/nekos-viewer.py"
          cp usr/share/nekos-viewer/nekos-viewer.py nekos-viewer-deb/usr/share/nekos-viewer/
        else
          echo "ERROR: nekos-viewer.py not found!"
          exit 1
        fi
        
        chmod 755 nekos-viewer-deb/usr/share/nekos-viewer/nekos-viewer.py

        cat > nekos-viewer-deb/usr/bin/nekos-viewer << 'BINEOF'
#!/bin/bash
exec python3 /usr/share/nekos-viewer/nekos-viewer.py "$@"
BINEOF
        chmod 755 nekos-viewer-deb/usr/bin/nekos-viewer

        cat > nekos-viewer-deb/usr/share/applications/nekos-viewer.desktop << 'DESKEOF'
[Desktop Entry]
Name=Nekos Viewer
Exec=nekos-viewer
Icon=nekos-viewer
Type=Application
Categories=Network;Graphics;
Terminal=false
DESKEOF

        VERSION_CLEAN="${VERSION#v}"
        cat > nekos-viewer-deb/DEBIAN/control << CTRLEOF
Package: nekos-viewer
Version: ${VERSION_CLEAN}
Section: web
Priority: optional
Architecture: all
Depends: python3, python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0
Maintainer: Nekos Viewer Team <13378290421@163.com>
Description: Random image viewer for Nekos.moe
 A simple GTK4 application for Nekos.moe API.
CTRLEOF

        chmod 755 nekos-viewer-deb/DEBIAN
        chmod 644 nekos-viewer-deb/DEBIAN/control

        dpkg-deb --build nekos-viewer-deb "nekos-viewer_${VERSION_CLEAN}_all.deb"
        
        echo "=== Build output ==="
        ls -la nekos-viewer_*.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekos-viewer-deb
        path: nekos-viewer_*.deb

    - name: Create Release (if tag pushed)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: nekos-viewer_*.deb
        name: Nekos Viewer ${{ github.ref_name }}
        body: |
          🐱 **Nekos Viewer ${{ github.ref_name }}**

          ## 安装
          ```bash
          sudo dpkg -i nekos-viewer_*.deb
          sudo apt --fix-broken install
          ```

          ## 依赖
          - Debian 13 / Ubuntu 24.04+
          - python3-gi, gir1.2-gtk-4.0, gir1.2-gdkpixbuf-2.0

          ## 运行
          ```bash
          nekos-viewer
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
